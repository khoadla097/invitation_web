<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thử thách Lật Bài - Chuyến Đi Phan Thiết</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="app-background">
    <!-- Animated background bubbles for dynamic feel -->
    <div class="bubble bubble--1"></div>
    <div class="bubble bubble--2"></div>
    <div class="bubble bubble--3"></div>
  </div>

  <main class="app-container">
    <!-- Screen 1: Welcome Screen -->
    <section id="welcome-screen" class="screen screen--active">
      <div class="glass-panel welcome-card">
        <div class="welcome-card__header">
          <div class="logo-badge">🌴</div>
          <h1 class="welcome-card__title">Thử Thách Lật Bài</h1>
          <p class="welcome-card__subtitle">Nhận ngay phần quà đặc biệt từ Phan Thiết!</p>
        </div>
        
        <div class="welcome-card__form">
          <label for="name-input" class="welcome-card__label">Nhập tên của bạn để bắt đầu</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="name-input" 
              class="input-field" 
              placeholder="Tên của bạn..." 
              maxlength="25"
              autocomplete="off" 
              required
            />
            <span class="input-focus-border"></span>
          </div>
          <p id="name-error" class="error-msg"></p>
          <button id="start-btn" class="btn btn--primary">Bắt đầu</button>
        </div>
      </div>
    </section>

    <!-- Screen 2: Game Screen -->
    <section id="game-screen" class="screen">
      <div class="glass-panel game-card">
        <header class="game-header">
          <div class="game-header__greeting">
            Chào <span id="player-display" class="highlight"></span>, chúc may mắn!
          </div>
          <div class="game-stats">
            <div class="stat-badge">
              <span class="stat-badge__label">Lượt đi:</span>
              <span id="moves-count" class="stat-badge__val">0</span>
            </div>
            <div class="stat-badge">
              <span class="stat-badge__label">Khớp:</span>
              <span id="matches-count" class="stat-badge__val">0</span>/4
            </div>
          </div>
        </header>

        <div class="board-wrapper">
          <div id="game-board" class="game-board">
            <!-- Cards will be dynamically generated by game.js -->
          </div>
        </div>

        <footer class="game-footer">
          <button id="reset-btn" class="btn btn--secondary">Chơi lại từ đầu</button>
        </footer>
      </div>
    </section>

    <!-- Screen 3: Victory Screen -->
    <section id="victory-screen" class="screen">
      <div class="glass-panel victory-card">
        <div class="victory-card__badge">🏆</div>
        <h2 class="victory-card__title">Chiến Thắng!</h2>
        
        <div class="victory-card__message-container">
          <p id="victory-message" class="victory-card__text">
            Chúc mừng <span id="winner-display" class="highlight highlight--large"></span> đã chiến thắng! Phần thưởng của bạn là một chuyến du lịch Phan Thiết!
          </p>
        </div>

        <div class="victory-card__decorations">
          <span class="emoji-float">🌴</span>
          <span class="emoji-float">🌊</span>
          <span class="emoji-float">☀️</span>
          <span class="emoji-float">🍹</span>
        </div>

        <button id="restart-btn" class="btn btn--primary btn--pulse">Chơi lại</button>
      </div>
    </section>
  </main>

  <!-- JS Modules loaded at the end of the body -->
  <script type="module" src="src/js/main.js"></script>
</body>
</html>
